<style>

    --ink:#14213D; --paper:#F2F3F1; --card:rgba(255,255,255,0.86); --line:#E6E4DC;
    --muted:#9A9585; --muted2:#5B6472; --teal:#0E7C7B; --gold:#E3A857; --danger:#C24949;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:linear-gradient(180deg,#F7F8F6 0%,#EEF0EC 100%);
    color:var(--ink); font-family:'Noto Sans TC',sans-serif; -webkit-font-smoothing:antialiased;
    min-height:100vh; padding-bottom:env(safe-area-inset-bottom);
  }
  .display{font-family:'Noto Serif TC',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .wrap{max-width:640px;margin:0 auto;padding:20px 16px 90px;}
  .center-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px 16px;}
  .glass{
    background:var(--card); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);

  .btn{border:none;border-radius:14px;padding:13px 20px;font-weight:600;font-size:15px;cursor:pointer;font-family:inherit;transition:transform .12s ease, opacity .12s ease;}
  .btn:active{transform:scale(0.97);}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-teal{background:var(--teal);color:#fff;}
  .btn-outline{background:rgba(255,255,255,0.7);border:1px solid var(--line);color:var(--ink);}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(194,73,73,0.4);}
  .btn-full{width:100%;}
  .btn-sm{padding:8px 14px;font-size:13px;border-radius:11px;}
  .input{border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-family:inherit;font-size:15px;background:#fff;color:var(--ink);width:100%;}
  .input:focus{outline:2px solid var(--teal);outline-offset:1px;}
  .row{display:flex;gap:8px;}
  .link-btn{background:none;border:none;color:var(--muted2);font-size:13px;cursor:pointer;padding:0;font-family:inherit;}
  .eyebrow{font-size:11px;letter-spacing:.28em;color:var(--gold);font-weight:600;}
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;

  .ticket-code{background:#fff;padding:9px 16px;font-size:19px;font-weight:700;letter-spacing:.22em;color:var(--ink);}

  .legend-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px 5px 6px;border-radius:999px;background:rgba(255,255,255,0.7);border:1px solid var(--line);font-size:12.5px;}

  .cal-nav{width:32px;height:32px;border-radius:50%;border:none;background:rgba(20,33,61,0.06);color:var(--ink);cursor:pointer;font-size:17px;line-height:1;}

  .cal-wd{text-align:center;font-size:11px;color:var(--muted);font-weight:600;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;}
  .cal-cell{

  .hour-label{width:52px;flex-shrink:0;font-size:11px;color:var(--muted2);padding-top:3px;font-family:'IBM Plex Mono',monospace;}
  .hour-cell{flex:1;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .half-slot{

  .half-dots{display:flex;gap:3px;flex-wrap:wrap;}

  .rank-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
  .rank-chip{
    flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;

  .switch{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted2);cursor:pointer;}

  .banner{background:#FFF6E6;border:1px solid var(--gold);color:#6B4E1A;border-radius:14px;padding:12px 14px;font-size:12.5px;margin-bottom:14px;line-height:1.6;}

/* local fallback so the page still renders before Firebase is configured.
   Mimics Firebase's nested-path behaviour: writing to rooms/CODE/meta must be
   visible to a listener on rooms/CODE. A flat key store (the previous version)
   does not do this, which is why the room view got stuck on "載入中". */
const LOCAL_DB = {};
const LOCAL_LISTENERS = []; // {path, cb}
function splitPath(p) { return p.split("/").filter(Boolean); }
function localGet(path) {
  let cur = LOCAL_DB;
  for (const seg of splitPath(path)) { if (cur == null) return null; cur = cur[seg]; }
  return cur === undefined ? null : cur;
}
function localNotify() { LOCAL_LISTENERS.forEach(({ path, cb }) => cb({ val: () => localGet(path) })); }
function localSet(path, value) {
  const segs = splitPath(path);
  if (segs.length === 0) { Object.keys(LOCAL_DB).forEach(k => delete LOCAL_DB[k]); Object.assign(LOCAL_DB, value || {}); localNotify(); return; }
  let cur = LOCAL_DB;
  for (let i = 0; i < segs.length - 1; i++) { const s = segs[i]; if (typeof cur[s] !== "object" || cur[s] === null) cur[s] = {}; cur = cur[s]; }
  cur[segs[segs.length - 1]] = value;
  localNotify();
}
function localRemove(path) {
  const segs = splitPath(path);
  if (segs.length === 0) { Object.keys(LOCAL_DB).forEach(k => delete LOCAL_DB[k]); localNotify(); return; }
  let cur = LOCAL_DB;
  for (let i = 0; i < segs.length - 1; i++) { cur = cur ? cur[segs[i]] : null; }
  if (cur) delete cur[segs[segs.length - 1]];
  localNotify();
}
function localRef(path) {
  return {
    set: (v) => { localSet(path, v); return Promise.resolve(); },
    update: (v) => { localSet(path, { ...(localGet(path) || {}), ...v }); return Promise.resolve(); },
    remove: () => { localRemove(path); return Promise.resolve(); },
    once: () => Promise.resolve({ val: () => localGet(path) }),
    on: (evt, cb) => { LOCAL_LISTENERS.push({ path, cb }); cb({ val: () => localGet(path) }); },
    off: () => { for (let i = LOCAL_LISTENERS.length - 1; i >= 0; i--) if (LOCAL_LISTENERS[i].path === path) LOCAL_LISTENERS.splice(i, 1); },
  };
}
function ref(path) { return db ? db.ref(path) : localRef(path); }

/* ============================================================ helpers */
const CODE_CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
function genCode(len=6){ let s=""; for(let i=0;i<len;i++) s+=CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)]; return s; }
const WEEKDAY = ["日","一","二","三","四","五","六"];

/* ============================================================
   台灣國定假日資料 — 內建保底資料 + 即時抓取增強的雙保險做法。

   FALLBACK_HOLIDAYS 是根據行政院人事行政總處公告的官方辦公日曆表
   整理的簡稱版本，直接寫在程式碼裡，不管網路狀況如何都保證會顯示。
   同時仍會嘗試向 ruyut/TaiwanCalendar（GitHub 社群專案，透過
   jsDelivr CDN 提供）即時抓取資料來補足或更新，抓取成功就用抓到的
   （並自動轉成簡稱），失敗的話就靜靜地繼續用內建保底資料，不影響
   使用。

   之後政府公告新年度（例如118年/2029年）行事曆時，可以在
   FALLBACK_HOLIDAYS 裡比照格式新增當年日期即可。
============================================================ */
const FALLBACK_HOLIDAYS = {
  // 2026（民國115年）
  "2026-01-01": "元旦",

  "2027-02-04": "小年夜",

// 把常見的落落長官方全名縮成短稱，避免小格子裡塞不下
const HOLIDAY_NAME_SHORTEN = [
  [/臺灣光復.*/, "光復節"],
  [/台灣光復.*/, "光復節"],
  [/中華民國開國紀念日/, "元旦"],
  [/和平紀念日.*/, "和平紀念日"],
  [/軍人節.*/, "軍人節"],
];
function shortenHolidayName(name) {
  for (const [pattern, short] of HOLIDAY_NAME_SHORTEN) {
    if (pattern.test(name)) return short;
  }
  return name.length > 5 ? name.slice(0, 5) : name;
}

const TW_HOLIDAY_CACHE = {};      // year(string) -> {dateStr: {name, isHoliday}} | null(抓取失敗)
const TW_HOLIDAY_FETCHING = new Set();

function ensureHolidayYearLoaded(year) {
  if (TW_HOLIDAY_CACHE[year] !== undefined || TW_HOLIDAY_FETCHING.has(year)) return;
  TW_HOLIDAY_FETCHING.add(year);
  fetch(`https://cdn.jsdelivr.net/gh/ruyut/TaiwanCalendar/data/${year}.json`)
    .then(res => { if (!res.ok) throw new Error("no data for " + year); return res.json(); })
    .then(list => {
      const map = {};
      list.forEach(item => {
        if (item.description) {
          const d = item.date; // "YYYYMMDD"
          const iso = `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
          map[iso] = { name: shortenHolidayName(item.description), isHoliday: !!item.isHoliday };
        }
      });
      TW_HOLIDAY_CACHE[year] = map;
      TW_HOLIDAY_FETCHING.delete(year);
      if (state.view === "room") render(); // 抓到更新資料後刷新一次月曆
    })
    .catch(() => {
      TW_HOLIDAY_CACHE[year] = null; // 抓取失敗，改用內建保底資料，不再重試
      TW_HOLIDAY_FETCHING.delete(year);
    });
}
function getHoliday(dateStr) {
  const year = dateStr.slice(0,4);
  ensureHolidayYearLoaded(year);
  const fetched = TW_HOLIDAY_CACHE[year];
  if (fetched && fetched[dateStr]) return fetched[dateStr];
  if (FALLBACK_HOLIDAYS[dateStr]) return { name: FALLBACK_HOLIDAYS[dateStr], isHoliday: true };
  return null;
}


const PALETTE = [
  {name:"紅", hex:"#D9534F"}, {name:"藍", hex:"#3D6EA5"}, {name:"綠", hex:"#2F8F5B"},
  {name:"黃", hex:"#E0A82E"}, {name:"紫", hex:"#7B5CA5"}, {name:"橘", hex:"#C97A3D"},
  {name:"粉", hex:"#C2588E"}, {name:"青", hex:"#0E9488"},
];
function toISO(y,m,day){ return `${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`; }
function fmtDate(d){ const dt=new Date(d+"T00:00:00"); return { md:`${dt.getMonth()+1}/${dt.getDate()}`, wd:WEEKDAY[dt.getDay()] }; }
function buildMonthCells(y,m){
  const startWd = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const cells=[]; for(let i=0;i<startWd;i++) cells.push(null); for(let d=1;d<=daysInMonth;d++) cells.push(d);
  return cells;
}
function daysRemaining(createdAt){
  const expires = createdAt + 30*24*60*60*1000;
  return Math.max(0, Math.ceil((expires - Date.now())/(24*60*60*1000)));
}
async function sweepExpiredRooms(){
  // Best-effort site-wide cleanup: runs whenever ANYONE opens the site (not just
  // the specific expired room), so an abandoned room can still get cleaned up
  // as long as someone, anywhere, visits the site at all.
  try {
    const snap = await ref("rooms").once("value");
    const rooms = snap.val();
    if (!rooms) return;
    const deletions = Object.entries(rooms)
      .filter(([, r]) => r && r.meta && daysRemaining(r.meta.createdAt) <= 0)
      .map(([code]) => ref(`rooms/${code}`).remove());
    if (deletions.length) await Promise.all(deletions);
  } catch (e) {
    // best-effort only; ignore failures (e.g. permission errors)
  }
}
function showToast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(showToast._t); showToast._t=setTimeout(()=>t.classList.remove("show"),1800);
}
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ============================================================ state */
const today = new Date();
const todayISO = toISO(today.getFullYear(), today.getMonth(), today.getDate());

const state = {
  view: "home",             // home | create | room
  joinError: "",
  roomCode: "",
  room: null,                // {meta, participants}

  noteDraft: "",

  confirmDeleteOpen: false,
  confirmLeaveEmptyOpen: false,
  editingTitle: false,

  editingRules: false,
  rulesDraft: "",
  bestOnly: false,
  showAllResults: false,
  showHelp: false,
  formTitle: "",
  formMode: "date",          // date | date_time
  formRestrictDates: false,
  formAllowedRanges: [],     // [{start,end}] — dates outside these ranges are locked for everyone, including the host
  formRangeDraftStart: "",
  formRangeDraftEnd: "",
  formStartHour: 9,
  formEndHour: 22,
  formRules: "",
  creating: false,
  createError: "",
};

let roomRef = null;

async function handleJoinRoom(codeRaw){
  const code = (codeRaw||"").trim().toUpperCase();
  if (!code) return;
  state.joinError = "";
  const snap = await ref(`rooms/${code}/meta`).once("value");
  const meta = snap.val();
  if (!meta) { state.joinError = "找不到這個房間代碼，請確認後再試一次。"; render(); return; }
  enterRoom(code);
}

async function handleCreateRoom(){
  if (!state.formTitle.trim()) return;
  state.createError = "";
  await authReady;
  state.creating = true; render();
  const code = genCode();
  const meta = {
    title: state.formTitle.trim(),
    mode: state.formMode,
    rules: state.formRules.trim().slice(0,100),
    allowedRanges: state.formRestrictDates ? state.formAllowedRanges : [],
    createdAt: Date.now(),
    hostUid: myUid,
    locked: false,
    finalizedDate: null,
    finalizedSlot: null,
  };
  if (state.formMode === "date_time") {
    meta.startHour = state.formStartHour;
    meta.endHour = state.formEndHour;
  }
  try {
    await ref(`rooms/${code}/meta`).set(meta);
    state.creating = false;
    enterRoom(code, true, meta.title);
  } catch(e) {
    state.creating = false;
    state.createError = "建立房間失敗，請確認網路連線或 Firebase 設定後再試一次。";
    render();
  }
}

/* ============================================================ ROOM */
function enterRoom(code, justCreated, knownTitle){
  if (roomRef) roomRef.off("value");
  state.roomCode = code;
  state.room = null;
  state.calYear = today.getFullYear();
  state.calMonth = today.getMonth();
  state.bestOnly = false;
  state.showAllResults = false;
  state.selectedDetailDate = null;
  state.confirmDeleteOpen = false;
  state.confirmLeaveEmptyOpen = false;
  state.editingTitle = false;
  state.editingRules = false;
  state.view = "room";
  render();

  roomRef = ref(`rooms/${code}`);
  roomRef.on("value", (snap) => {
    const val = snap.val();
    if (!val) { showToast("這個房間已經被刪除"); state.view="home"; render(); return; }
    // best-effort 30-day expiry: since there's no backend to run scheduled
    // cleanup, whoever opens the room after it expires triggers the deletion.
    if (val.meta && daysRemaining(val.meta.createdAt) <= 0) {
      roomRef.off("value");
      ref(`rooms/${code}`).remove().finally(() => {
        showToast("此房間已超過 30 天保存期限，已自動清除");
        state.view = "home"; render();
      });
      return;
    }
    state.room = val;
    render();
  });

  if (justCreated) {
    navigator.clipboard.writeText(buildShareText(code, knownTitle)).then(()=>showToast("已複製分享連結")).catch(()=>{});
    const url = new URL(window.location.href);
    url.searchParams.set("code", code);
    history.replaceState(null, "", url.toString());
  }
}

function buildShareText(code, titleOverride){
  const url = new URL(window.location.href);
  url.searchParams.set("code", code);
  const title = titleOverride !== undefined ? titleOverride : (state.room && state.room.meta ? state.room.meta.title : "");
  return `快來敲時間！${title ? `《${title}》` : ""}\n房號：${code}\n${url.toString()}`;
}

function buildResultsText(){
  const meta = state.room.meta;
  const participants = Object.entries(state.room.participants || {}).map(([uid,p])=>({uid,...p}));
  const total = participants.length;

  function hasAnySlot(v){ return !!(v && typeof v === "object" && Object.values(v).some(Boolean)); }
  function slotHours(){
    if (meta.startHour === undefined || meta.endHour === undefined) return [];
    return Array.from({ length: Math.max(1, meta.endHour - meta.startHour) }, (_, i) => meta.startHour + i);
  }
  function bestSlotFor(d){
    let best = null;
    slotHours().forEach(h => {
      ["00","30"].forEach(mm => {
        const slotKey = `${h}:${mm}`;
        const c = participants.filter(p => p.picks && p.picks[d] && p.picks[d][slotKey]).length;
        if (c>0 && (!best || c>best.count)) best = { label: `${String(h).padStart(2,"0")}:${mm}`, count: c };
      });
    });
    return best;
  }

  const countMap = {};
  participants.forEach(p => {
    Object.entries(p.picks||{}).forEach(([d,v])=>{
      if (meta.mode === "date_time") { if (hasAnySlot(v)) countMap[d]=(countMap[d]||0)+1; }
      else if (v) countMap[d]=(countMap[d]||0)+1;
    });
  });
  const datesSorted = Object.keys(countMap).sort((a,b)=>countMap[b]-countMap[a]);

  const lines = [];
  lines.push(`📊 ${meta.title}${meta.mode==="date_time" ? " ・時段統計" : " ・日期統計"}`);

  if (meta.finalizedDate) {
    const { md, wd } = fmtDate(meta.finalizedDate);
    const namesFinal = participants.filter(p => {
      const v = p.picks && p.picks[meta.finalizedDate];
      if (meta.mode === "date_time" && meta.finalizedSlot) return v && v[meta.finalizedSlot];
      return meta.mode === "date_time" ? hasAnySlot(v) : !!v;
    }).map(p=>p.name);
    lines.push("");
    lines.push(`🎉 已定案：${md}（週${wd}）${meta.finalizedSlot ? " " + meta.finalizedSlot : ""}`);
    lines.push(`可以的人：${namesFinal.length ? namesFinal.join("、") : "（無）"}`);
  }

  lines.push("");
  if (datesSorted.length === 0) {
    lines.push("目前還沒有人填寫。");
  } else {
    const medals = ["🥇","🥈","🥉"];
    datesSorted.forEach((d,i) => {
      const { md, wd } = fmtDate(d);
      const medal = medals[i] || "•";
      const names = participants.filter(p => {
        const v = p.picks && p.picks[d];
        return meta.mode === "date_time" ? hasAnySlot(v) : !!v;
      }).map(p=>p.name);
      let line = `${medal} ${md}（週${wd}）・${countMap[d]}人`;
      if (meta.mode === "date_time") {
        const best = bestSlotFor(d);
        if (best) line += `（最佳時段 ${best.label}，${best.count}人）`;
      }
      lines.push(line);
      lines.push(`　可以：${names.join("、")}`);
    });
    lines.push("");
    lines.push(`共 ${total} 人已填寫`);
  }

  return lines.join("\n");
}

async function copyResultsText(){
  try {
    await navigator.clipboard.writeText(buildResultsText());
    showToast("已複製結果文字");
  } catch(e) {
    showToast("複製失敗，請手動選取文字");
  }
}

function myParticipant(){
  if (!state.room || !state.room.participants) return null;
  return state.room.participants[myUid] || null;
}

async function submitName(){
  const name = state.nameDraft.trim().slice(0,12);
  if (!name) return;
  await authReady;
  const existing = Object.values(state.room.participants || {});
  const usedColors = existing.map(p=>p.color);
  const free = PALETTE.filter(c=>!usedColors.includes(c.hex));
  const chosen = (free.length ? free : PALETTE)[Math.floor(Math.random()*(free.length?free.length:PALETTE.length))];
  await ref(`rooms/${state.roomCode}/participants/${myUid}`).set({
    name, color: chosen.hex, joinedAt: Date.now(), note: "", picks: {},
  });
}

function isDateAllowed(dateStr, meta) {
  if (!meta.allowedRanges || meta.allowedRanges.length === 0) return true;
  return meta.allowedRanges.some(r => dateStr >= r.start && dateStr <= r.end);
}

async function toggleDatePick(dateStr){
  const me = myParticipant(); if (!me || state.room.meta.locked) return;
  if (!isDateAllowed(dateStr, state.room.meta)) return;

  const picks = { ...(me.picks||{}) };
  if (picks[dateStr]) delete picks[dateStr]; else picks[dateStr] = true;
  await ref(`rooms/${state.roomCode}/participants/${myUid}/picks`).set(picks);
}
async function toggleSegment(dateStr, slotKey){
  const me = myParticipant(); if (!me || state.room.meta.locked) return;
  const picks = { ...(me.picks||{}) };
  const cur = picks[dateStr] && typeof picks[dateStr]==="object" ? { ...picks[dateStr] } : {};
  cur[slotKey] = !cur[slotKey];
  if (!Object.values(cur).some(Boolean)) delete picks[dateStr]; else picks[dateStr] = cur;
  await ref(`rooms/${state.roomCode}/participants/${myUid}/picks`).set(picks);
}
async function selectAllSlotsForDate(dateStr){
  const me = myParticipant(); if (!me || state.room.meta.locked) return;
  const meta = state.room.meta;
  const hours = Array.from({ length: Math.max(1, (meta.endHour ?? 22) - (meta.startHour ?? 9)) }, (_, i) => (meta.startHour ?? 9) + i);
  const cur = {};
  hours.forEach(h => { cur[`${h}:00`] = true; cur[`${h}:30`] = true; });
  const picks = { ...(me.picks||{}), [dateStr]: cur };
  await ref(`rooms/${state.roomCode}/participants/${myUid}/picks`).set(picks);
}
async function clearAllSlotsForDate(dateStr){
  const me = myParticipant(); if (!me || state.room.meta.locked) return;
  const picks = { ...(me.picks||{}) };
  delete picks[dateStr];
  await ref(`rooms/${state.roomCode}/participants/${myUid}/picks`).set(picks);
}
async function clearMyPicks(){
  const me = myParticipant(); if (!me) return;
  await ref(`rooms/${state.roomCode}/participants/${myUid}/picks`).set({});
  showToast("已清除你的所有勾選");
}
async function saveNote(){
  const me = myParticipant(); if (!me) return;
  await ref(`rooms/${state.roomCode}/participants/${myUid}/note`).set(state.noteDraft.trim().slice(0,50));
  showToast("備註已儲存");
}

function startEditTitle(){
  state.titleDraft = state.room.meta.title;
  state.editingTitle = true;
  render();
}
function cancelEditTitle(){
  state.editingTitle = false;
  render();
}
async function saveTitle(){
  const newTitle = state.titleDraft.trim();
  if (!newTitle) return;
  await ref(`rooms/${state.roomCode}/meta/title`).set(newTitle.slice(0,30));
  state.editingTitle = false;
  render();
  showToast("房名已更新");
}
function startEditRules(){
  state.rulesDraft = state.room.meta.rules || "";
  state.editingRules = true;
  render();
}
function cancelEditRules(){
  state.editingRules = false;
  render();
}
async function saveRules(){
  await ref(`rooms/${state.roomCode}/meta/rules`).set(state.rulesDraft.trim().slice(0,100));
  state.editingRules = false;
  render();
  showToast("房規已更新");
}
async function finalizeDate(dateStr, slotKey){
  await ref(`rooms/${state.roomCode}/meta`).update({
    finalizedDate: dateStr,
    finalizedSlot: slotKey || null,
  });
  showToast("已將這天設為最終結果");
}
async function unfinalize(){
  await ref(`rooms/${state.roomCode}/meta`).update({ finalizedDate: null, finalizedSlot: null });
  showToast("已取消定案");
}
function dismissKeyboard(){
  if (document.activeElement && typeof document.activeElement.blur === "function") {
    document.activeElement.blur();
  }
  setTimeout(() => window.scrollTo(0, 0), 50);
}
function requestLeaveRoom(){
  const noOneJoined = state.room && (!state.room.participants || Object.keys(state.room.participants).length === 0);
  if (noOneJoined) {
    dismissKeyboard();
    state.confirmLeaveEmptyOpen = true;
    render();
  } else {
    doLeaveRoom(false);
  }
}
function cancelLeaveEmpty(){
  state.confirmLeaveEmptyOpen = false;
  render();
}
async function doLeaveRoom(shouldDelete){
  const code = state.roomCode;
  if (roomRef) roomRef.off("value");
  state.confirmLeaveEmptyOpen = false;
  state.view = "home";
  render();
  if (shouldDelete && code) {
    try { await ref(`rooms/${code}`).remove(); } catch (e) { /* best effort */ }
  }
}
function requestDeleteRoom(){
  dismissKeyboard();
  state.confirmDeleteOpen = true;
  render();
}
function cancelDeleteRoom(){
  state.confirmDeleteOpen = false;
  render();
}
async function confirmDeleteRoom(){
  state.confirmDeleteOpen = false;
  await ref(`rooms/${state.roomCode}`).remove();
  state.view = "home"; render();
}
function jumpToday(){ state.calYear=today.getFullYear(); state.calMonth=today.getMonth(); render(); }
function openDateDetail(dateStr){
  state.selectedDetailDate = state.selectedDetailDate === dateStr ? null : dateStr;
  render();
}
function shiftMonth(delta){
  let m=state.calMonth+delta, y=state.calYear;
  if (m<0){m=11;y-=1;} if (m>11){m=0;y+=1;}
  state.calYear=y; state.calMonth=m; render();
}
function jumpToDate(dateStr){
  const dt = new Date(dateStr+"T00:00:00");
  state.calYear = dt.getFullYear(); state.calMonth = dt.getMonth();
  if (state.room && state.room.meta && state.room.meta.mode === "date_time") {
    state.selectedDetailDate = dateStr;
  }
  render();
}
function copyShareUrl(){
  navigator.clipboard.writeText(buildShareText(state.roomCode)).then(()=>showToast("已複製分享文字（含房號與連結）")).catch(()=>{});
}

function heatColor(count, total){
  if (!total || !count) return "#FFFFFF";
  const t = count/total;
  // gray -> yellow -> green -> deep green
  const stops = [
    {p:0, c:[240,241,238]}, {p:0.33, c:[230,192,74]}, {p:0.66, c:[110,168,96]}, {p:1, c:[27,110,62]},
  ];
  let a=stops[0], b=stops[stops.length-1];
  for (let i=0;i<stops.length-1;i++){ if (t>=stops[i].p && t<=stops[i+1].p){ a=stops[i]; b=stops[i+1]; break; } }
  const span = (b.p-a.p) || 1; const lt = (t-a.p)/span;
  const r=Math.round(a.c[0]+(b.c[0]-a.c[0])*lt), g=Math.round(a.c[1]+(b.c[1]-a.c[1])*lt), bl=Math.round(a.c[2]+(b.c[2]-a.c[2])*lt);
  return `rgb(${r},${g},${bl})`;
}

function renderRoom(){
  if (!state.room || !state.room.meta) {
    app.innerHTML = `<div class="center-wrap"><div style="color:var(--muted2);">載入中…</div></div>`;
    return;
  }
  const meta = state.room.meta;
  const participants = Object.entries(state.room.participants || {}).map(([uid,p])=>({uid,...p}));
  const me = myParticipant();
  const isHost = myUid === meta.hostUid;
  const total = participants.length;
  const remaining = daysRemaining(meta.createdAt);
  const hostParticipant = participants.find(p => p.uid === meta.hostUid);
  const hostName = hostParticipant ? hostParticipant.name : (isHost ? "你（尚未輸入名字）" : "尚未加入");
  const hourRange = meta.mode === "date_time"
    ? Array.from({ length: Math.max(1, (meta.endHour ?? 22) - (meta.startHour ?? 9)) }, (_, i) => (meta.startHour ?? 9) + i)
    : [];

  function hasAnySlot(v) {
    return !!(v && typeof v === "object" && Object.values(v).some(Boolean));
  }

  // day counts
  const countMap = {};
  participants.forEach(p => {
    Object.entries(p.picks||{}).forEach(([d,v])=>{
      if (meta.mode === "date_time") {
        if (hasAnySlot(v)) countMap[d]=(countMap[d]||0)+1;
      } else if (v) countMap[d]=(countMap[d]||0)+1;
    });
  });
  const allDatesSorted = Object.keys(countMap).sort((a,b)=>countMap[b]-countMap[a]);
  const ranked = allDatesSorted.slice(0,3);
  const topSet = new Set(ranked);

  const monthCells = buildMonthCells(state.calYear, state.calMonth);
  const canPrevMonth = !(state.calYear===today.getFullYear() && state.calMonth===today.getMonth());

  const legendHtml = participants.length ? `
    <div class="legend">
      ${participants.map(p=>`
        <span class="legend-chip" style="font-size:14.5px;">
          <span class="dot" style="background:${p.color}"></span>${esc(p.name)}${p.uid===meta.hostUid?' 👑':''}
          ${p.note ? `<span style="color:var(--muted2);font-style:italic;">・${esc(p.note)}</span>` : ``}
        </span>
      `).join("")}
    </div>
  ` : `<div style="font-size:12.5px;color:var(--muted);">還沒有人加入</div>`;

  function bestSlotForDate(dateStr) {
    if (meta.mode !== "date_time") return null;
    let best = null;
    hourRange.forEach(h => {
      ["00","30"].forEach(mm => {
        const slotKey = `${h}:${mm}`;
        const c = participants.filter(p => p.picks && p.picks[dateStr] && p.picks[dateStr][slotKey]).length;
        if (c > 0 && (!best || c > best.count)) best = { label: `${String(h).padStart(2,"0")}:${mm}`, count: c };
      });
    });
    return best;
  }

  const rankHtml = ranked.length ? `
    <div style="margin-bottom:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <div style="font-size:12.5px;font-weight:600;color:var(--muted2);">熱門日期</div>
        <label class="switch ${state.bestOnly?'on':''}" id="best-only-toggle">
          <span class="track"><span class="thumb"></span></span>只看最佳日期
        </label>
      </div>
      <div class="rank-row">
        ${ranked.map((d,i)=>{
          const {md,wd}=fmtDate(d); const medal=["🥇","🥈","🥉"][i];
          const bestSlot = bestSlotForDate(d);
          const isFinalDate = meta.finalizedDate === d;
          return `
          <div class="rank-chip" data-jump="${d}" style="${isFinalDate?'box-shadow:inset 0 0 0 2px #E3A857;':''}">
            <span class="rank-medal">${medal}</span>
            <span>${md} 週${wd}</span>
            <span class="n">${countMap[d]} 人</span>
            ${bestSlot ? `<span style="font-size:10.5px;color:var(--teal);font-weight:600;">最佳 ${bestSlot.label}（${bestSlot.count}人）</span>` : ``}
            ${isHost && meta.mode === "date" ? `<button class="link-btn finalize-date-btn" data-final-date="${d}" style="font-size:10.5px;color:${isFinalDate?'var(--danger)':'var(--teal)'};margin-top:2px;">${isFinalDate?'取消定案':'設為定案'}</button>` : ``}
          </div>`;
        }).join("")}
      </div>
      ${allDatesSorted.length > 3 ? `
      <div style="text-align:right;margin-top:6px;">
        <button class="link-btn" id="toggle-all-results" style="font-size:11.5px;">${state.showAllResults ? "收起" : `查看全部結果（共 ${allDatesSorted.length} 天）`} ${state.showAllResults ? "▴" : "▾"}</button>
      </div>
      ${state.showAllResults ? `
      <div class="fade-in" style="margin-top:8px;border-top:1px solid var(--line);padding-top:8px;">
        ${allDatesSorted.map((d,i) => {
          const {md,wd} = fmtDate(d);
          const names = participants.filter(p => {
            const v = p.picks && p.picks[d];
            return meta.mode === "date_time" ? hasAnySlot(v) : !!v;
          }).map(p=>p.name);
          const bestSlot = bestSlotForDate(d);
          return `
          <div style="display:flex;justify-content:space-between;align-items:baseline;padding:5px 2px;font-size:12.5px;${i<allDatesSorted.length-1?'border-bottom:1px solid var(--line);':''}">
            <span><b style="color:var(--ink);">${i+1}.</b> ${md} 週${wd} <span style="color:var(--muted);">${names.join("、")}</span></span>
            <span style="color:var(--teal);font-weight:600;white-space:nowrap;margin-left:8px;">${countMap[d]}人${bestSlot?` · ${bestSlot.label}`:``}</span>
          </div>`;
        }).join("")}
      </div>
      ` : ``}
      ` : ``}
    </div>
  ` : ``;

  let calCellsHtml = "";
  monthCells.forEach((day, i) => {
    if (day === null) { calCellsHtml += `<div class="cal-cell pad"></div>`; return; }
    const dateStr = toISO(state.calYear, state.calMonth, day);
    const isPast = dateStr < todayISO;
    const isTodayCell = dateStr === todayISO;
    const isAllowed = isDateAllowed(dateStr, meta);
    const isDisabled = isPast || !isAllowed;
    const count = countMap[dateStr] || 0;
    const faded = state.bestOnly && ranked.length && !topSet.has(dateStr) && dateStr !== todayISO;
    const bg = heatColor(count, total);
    const dotsHtml = participants.filter(p => {
      const v = p.picks && p.picks[dateStr];
      return meta.mode==="date_time" ? hasAnySlot(v) : !!v;
    }).map(p => `<span class="dot" style="background:${p.color}"></span>`).join("");

    const isOpenDetail = meta.mode === "date_time" && state.selectedDetailDate === dateStr;
    const holiday = getHoliday(dateStr);
    const holidayColor = holiday ? (holiday.isHoliday ? "var(--danger)" : "#8A6D1E") : "";

    calCellsHtml += `
      <div class="cal-cell ${isDisabled?'disabled':''} ${isTodayCell?'today':''} ${faded?'faded':''}" data-date="${!isDisabled ? dateStr : ''}" style="background:${bg};${isOpenDetail?'box-shadow:inset 0 0 0 2px #E3A857;':''}">
        <div class="cal-daynum" style="${holiday?`color:${holidayColor};`:''}">${day}</div>
        ${holiday ? `<div class="holiday-tag" style="color:${holidayColor};">${esc(holiday.name)}</div>` : ``}
        <div class="dotwrap">${dotsHtml}</div>
      </div>
    `;
  });

  let dayDetailHtml = "";
  if (meta.mode === "date_time" && state.selectedDetailDate && me) {
    const d = state.selectedDetailDate;
    const { md, wd } = fmtDate(d);
    dayDetailHtml = `
      <div class="glass fade-in" style="padding:14px;margin-top:12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;">
          <div style="font-size:13px;font-weight:600;">${md} 週${wd} · 點選時段（可點半小時）</div>
          <div style="display:flex;gap:6px;">
            <button class="link-btn" id="select-all-slots" style="font-size:11.5px;color:var(--teal);">全選</button>
            <button class="link-btn" id="clear-all-slots" style="font-size:11.5px;color:var(--danger);">全清除</button>
          </div>
        </div>
        <div class="hourlist">
          ${hourRange.map((h) => {
            const slotKey0 = `${h}:00`, slotKey30 = `${h}:30`;
            function renderHalf(slotKey, isTop){
              const segParticipants = participants.filter(p => p.picks && p.picks[d] && p.picks[d][slotKey]);
              const active = me.picks && me.picks[d] && me.picks[d][slotKey];
              const segBg = segParticipants.length>0 ? heatColor(segParticipants.length,total) : "#fff";
              const isFinal = meta.finalizedDate === d && meta.finalizedSlot === slotKey;
              return `
                <div class="half-slot ${isTop?'top':''} ${active?'active':''}" data-seg-date="${d}" data-seg="${slotKey}" style="${active?`background:${me.color};`:`background:${segBg};`}${isFinal?'box-shadow:inset 0 0 0 2px #E3A857;':''}">
                  ${isHost ? `<button class="link-btn finalize-slot-btn" data-final-date="${d}" data-final-slot="${slotKey}" style="font-size:10px;color:${active?'#fff':'var(--teal)'};margin-right:4px;" title="設為最終時段">${isFinal?'🏁已定案':'設為定案'}</button>` : ``}
                  <span class="half-dots">${segParticipants.map(p=>`<span class="dot" style="background:${p.color}"></span>`).join("")}</span>
                </div>
              `;
            }
            return `
              <div class="hour-row">
                <div class="hour-label">${String(h).padStart(2,"0")}:00</div>
                <div class="hour-cell">
                  ${renderHalf(slotKey0, true)}
                  ${renderHalf(slotKey30, false)}
                </div>
              </div>
            `;
          }).join("")}
        </div>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="wrap">
      <div class="glass" style="padding:14px 16px;margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
          <div style="min-width:0;">
            <button class="link-btn" id="leave-room" style="margin-bottom:4px;">← 離開房間</button>
            ${state.editingTitle ? `
            <div class="row" style="align-items:center;">
              <input class="input" id="title-edit-input" value="${esc(state.titleDraft)}" maxlength="30" style="font-size:16px;padding:6px 10px;" />
              <button class="btn btn-teal btn-sm" id="save-title-btn">儲存</button>
              <button class="btn btn-outline btn-sm" id="cancel-title-btn">取消</button>
            </div>
            ` : `
            <h1 class="display" style="font-size:19px;font-weight:700;margin:0;display:inline;">${esc(meta.title)}</h1>
            ${isHost ? `<button class="link-btn" id="edit-title-btn" style="font-size:12px;margin-left:6px;color:var(--teal);">✏️ 改房名</button>` : ``}
            `}
            <div style="font-size:11.5px;color:var(--muted);margin-top:3px;">剩餘 ${remaining} 天 · ${total} 人 · 房主：${esc(hostName)} ${meta.locked?'· <b style="color:var(--danger);">已鎖定</b>':''}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;">
            <div class="ticket" id="share-ticket" style="cursor:pointer;" title="點擊複製分享連結">
              <div class="ticket-label mono">ROOM</div><div class="ticket-code mono">${state.roomCode}</div>
            </div>
            <div style="font-size:10.5px;color:var(--muted);">點擊複製分享連結</div>
          </div>
        </div>
        ${isHost ? `
        <div class="row" style="margin-top:10px;">
          <button class="btn btn-outline btn-sm" id="lock-btn">${meta.locked?"解除鎖定":"鎖定投票"}</button>
          <button class="btn btn-danger btn-sm" id="delete-btn">刪除房間</button>
        </div>` : ``}
      </div>

      ${(meta.rules || isHost) ? `
      <div class="glass" style="padding:12px 16px;margin-bottom:12px;background:rgba(227,168,87,0.12);">
        ${state.editingRules ? `
          <textarea class="input" id="rules-edit-input" rows="2" maxlength="100" style="margin-bottom:6px;">${esc(state.rulesDraft)}</textarea>
          <div class="row">
            <button class="btn btn-teal btn-sm" id="save-rules-btn">儲存</button>
            <button class="btn btn-outline btn-sm" id="cancel-rules-btn">取消</button>
          </div>
        ` : `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div style="font-size:12px;color:#7A5A1E;">${meta.rules ? `📌 ${esc(meta.rules)}` : `<span style="color:var(--muted);">尚未設定房間規則</span>`}</div>
            ${isHost ? `<button class="link-btn" id="edit-rules-btn" style="font-size:11px;color:var(--teal);white-space:nowrap;">${meta.rules?"編輯":"＋新增"}</button>` : ``}
          </div>
        `}
      </div>` : ``}

      ${meta.finalizedDate ? (() => {
        const { md, wd } = fmtDate(meta.finalizedDate);
        return `
        <div class="glass" style="padding:14px 16px;margin-bottom:12px;background:rgba(14,124,123,0.1);border-color:var(--teal);">
          <div style="font-size:14px;font-weight:700;color:var(--ink);">🎉 已定案：${md}（週${wd}）${meta.finalizedSlot ? " " + meta.finalizedSlot : ""}</div>
          <div class="row" style="margin-top:8px;">
            <button class="btn btn-teal btn-sm" id="copy-results-btn">複製結果文字</button>
            ${isHost ? `<button class="btn btn-outline btn-sm" id="unfinalize-btn">取消定案</button>` : ``}
          </div>
        </div>`;
      })() : `
      <div class="glass" style="padding:12px 16px;margin-bottom:12px;">
        <button class="btn btn-outline btn-sm btn-full" id="copy-results-btn">複製目前統計結果文字</button>
      </div>
      `}

      <div class="glass" style="padding:16px 14px;margin-bottom:14px;">
        <div style="font-size:14.5px;font-weight:600;color:var(--muted2);margin-bottom:6px;">參與者</div>
        ${legendHtml}
      </div>

      ${!me ? `
      <div class="glass fade-in" style="padding:18px;margin-bottom:14px;">
        <label style="font-size:13px;font-weight:600;display:block;margin-bottom:8px;">你的暱稱（請勿使用真實姓名）</label>
        <div class="row">
          <input class="input" id="name-input" placeholder="輸入暱稱加入房間（不要用真實姓名）" maxlength="12" />
          <button class="btn btn-teal" id="submit-name" style="white-space:nowrap;">加入</button>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-top:8px;">暱稱送出後就不能修改，系統會自動配一個專屬顏色。</div>
      </div>` : `

      <div class="glass" style="padding:16px 14px;margin-bottom:14px;">
        ${meta.locked ? `<div style="font-size:12.5px;color:var(--danger);margin-bottom:8px;">房主已鎖定，目前僅能查看。</div>` : ``}
        <div class="row" style="margin-bottom:12px;flex-wrap:wrap;">
          <button class="btn btn-outline btn-sm" id="jump-today">今日</button>
          <button class="btn btn-outline btn-sm" id="clear-mine">清除我的勾選</button>
          <div style="margin-left:auto;font-size:12.5px;color:var(--muted2);display:flex;align-items:center;gap:6px;">
            <span class="dot" style="background:${me.color}"></span>你是 ${esc(me.name)}
          </div>
        </div>

        ${rankHtml}

        <div class="cal-head">
          <button class="cal-nav" id="cal-prev" ${canPrevMonth?"":"disabled"}>‹</button>
          <div class="display" style="font-weight:700;font-size:15px;">${state.calYear} 年 ${state.calMonth+1} 月</div>
          <button class="cal-nav" id="cal-next">›</button>
        </div>
        <div class="cal-grid-wd">${WEEKDAY.map(w=>`<div class="cal-wd">${w}</div>`).join("")}</div>
        <div class="cal-grid">${calCellsHtml}</div>
        ${dayDetailHtml}
        <div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6;">
          🎌 紅字為國定假日、橘字為補班日，資料為自動抓取的社群整理版本。如有出入請以<a href="https://www.dgpa.gov.tw" target="_blank" rel="noopener" style="color:var(--teal);text-decoration:underline;">行政院人事行政總處官方行事曆</a>為準。
        </div>

        <div style="margin-top:14px;">
          <label style="font-size:12.5px;font-weight:600;display:block;margin-bottom:6px;">我的備註（最多 50 字，選填）</label>
          <div class="row">
            <textarea class="input" id="note-input" rows="1" maxlength="50" placeholder="例如：晚上七點後才有空">${esc(me.note||"")}</textarea>
            <button class="btn btn-outline btn-sm" id="save-note" style="white-space:nowrap;">儲存</button>
          </div>
          <div style="font-size:12px;font-weight:600;color:var(--danger);margin-top:6px;">⚠️ 備註所有房間成員都看得到，請勿填寫電話、地址等任何個人隱私資訊。</div>
        </div>
      </div>
      `}
    </div>
    ${state.confirmDeleteOpen ? `
    <div class="modal-overlay" id="delete-modal-overlay">
      <div class="modal-box">
        <div style="font-weight:700;font-size:15px;margin-bottom:8px;">確定要刪除這個房間嗎？</div>
        <div style="font-size:13px;color:var(--muted2);margin-bottom:16px;">所有人的資料都會消失，無法復原。</div>
        <div class="row">
          <button class="btn btn-outline btn-full" id="cancel-delete-btn">取消</button>
          <button class="btn btn-danger btn-full" id="confirm-delete-btn" style="background:var(--danger);color:#fff;border:none;">確定刪除</button>
        </div>
      </div>
    </div>
    ` : ``}
    ${state.confirmLeaveEmptyOpen ? `
    <div class="modal-overlay" id="leave-empty-modal-overlay">
      <div class="modal-box">
        <div style="font-weight:700;font-size:15px;margin-bottom:8px;">這個房間還沒有人加入</div>
        <div style="font-size:13px;color:var(--muted2);margin-bottom:16px;">離開房間會直接刪除這個房間，確定要離開嗎？</div>
        <div class="row">
          <button class="btn btn-outline btn-full" id="cancel-leave-empty-btn">取消</button>
          <button class="btn btn-danger btn-full" id="confirm-leave-empty-btn" style="background:var(--danger);color:#fff;border:none;">確定離開並刪除</button>
        </div>
      </div>
    </div>
    ` : ``}
  `;

  document.getElementById("leave-room").onclick = requestLeaveRoom;
  document.getElementById("share-ticket").onclick = copyShareUrl;
  const lockBtn = document.getElementById("lock-btn"); if (lockBtn) lockBtn.onclick = toggleLock;
  const editTitleBtn = document.getElementById("edit-title-btn"); if (editTitleBtn) editTitleBtn.onclick = startEditTitle;
  const saveTitleBtn = document.getElementById("save-title-btn"); if (saveTitleBtn) saveTitleBtn.onclick = saveTitle;
  const cancelTitleBtn = document.getElementById("cancel-title-btn"); if (cancelTitleBtn) cancelTitleBtn.onclick = cancelEditTitle;
  const titleEditInput = document.getElementById("title-edit-input");
  if (titleEditInput) {
    titleEditInput.oninput = (e) => state.titleDraft = e.target.value;
    titleEditInput.onkeydown = (e) => { if (e.key === "Enter") saveTitle(); if (e.key === "Escape") cancelEditTitle(); };
  }
  const editRulesBtn = document.getElementById("edit-rules-btn"); if (editRulesBtn) editRulesBtn.onclick = startEditRules;
  const saveRulesBtn = document.getElementById("save-rules-btn"); if (saveRulesBtn) saveRulesBtn.onclick = saveRules;
  const cancelRulesBtn = document.getElementById("cancel-rules-btn"); if (cancelRulesBtn) cancelRulesBtn.onclick = cancelEditRules;
  const rulesEditInput = document.getElementById("rules-edit-input");
  if (rulesEditInput) rulesEditInput.oninput = (e) => state.rulesDraft = e.target.value;
  const delBtn = document.getElementById("delete-btn"); if (delBtn) delBtn.onclick = requestDeleteRoom;
  const cancelDeleteBtn = document.getElementById("cancel-delete-btn"); if (cancelDeleteBtn) cancelDeleteBtn.onclick = cancelDeleteRoom;
  const confirmDeleteBtn = document.getElementById("confirm-delete-btn"); if (confirmDeleteBtn) confirmDeleteBtn.onclick = confirmDeleteRoom;
  const cancelLeaveEmptyBtn = document.getElementById("cancel-leave-empty-btn"); if (cancelLeaveEmptyBtn) cancelLeaveEmptyBtn.onclick = cancelLeaveEmpty;
  const confirmLeaveEmptyBtn = document.getElementById("confirm-leave-empty-btn"); if (confirmLeaveEmptyBtn) confirmLeaveEmptyBtn.onclick = () => doLeaveRoom(true);
  const copyResultsBtn = document.getElementById("copy-results-btn"); if (copyResultsBtn) copyResultsBtn.onclick = copyResultsText;
  const unfinalizeBtn = document.getElementById("unfinalize-btn"); if (unfinalizeBtn) unfinalizeBtn.onclick = unfinalize;
  document.querySelectorAll(".finalize-date-btn").forEach(btn => {
    btn.onclick = (ev) => { ev.stopPropagation(); const d = btn.dataset.finalDate; if (state.room.meta.finalizedDate === d) unfinalize(); else finalizeDate(d); };
  });
  document.querySelectorAll(".finalize-slot-btn").forEach(btn => {
    btn.onclick = (ev) => { ev.stopPropagation(); finalizeDate(btn.dataset.finalDate, btn.dataset.finalSlot); };
  });

  if (!me) {
    const nameInput = document.getElementById("name-input");
    nameInput.oninput = (e) => state.nameDraft = e.target.value;
    nameInput.onkeydown = (e) => { if (e.key==="Enter") submitName(); };
    document.getElementById("submit-name").onclick = submitName;
    if (!state.confirmLeaveEmptyOpen && !state.confirmDeleteOpen) {
      nameInput.focus();
    }
    return;
  }

  document.getElementById("jump-today").onclick = jumpToday;
  document.getElementById("clear-mine").onclick = clearMyPicks;
  const bestToggle = document.getElementById("best-only-toggle");
  if (bestToggle) bestToggle.onclick = () => { state.bestOnly = !state.bestOnly; render(); };
  const toggleAllResults = document.getElementById("toggle-all-results");
  if (toggleAllResults) toggleAllResults.onclick = () => { state.showAllResults = !state.showAllResults; render(); };
  const selectAllBtn = document.getElementById("select-all-slots");
  if (selectAllBtn) selectAllBtn.onclick = () => selectAllSlotsForDate(state.selectedDetailDate);
  const clearAllBtn = document.getElementById("clear-all-slots");
  if (clearAllBtn) clearAllBtn.onclick = () => clearAllSlotsForDate(state.selectedDetailDate);
  document.getElementById("cal-prev").onclick = () => shiftMonth(-1);
  document.getElementById("cal-next").onclick = () => shiftMonth(1);
  document.querySelectorAll("[data-jump]").forEach(el => el.onclick = () => jumpToDate(el.dataset.jump));

  if (meta.mode === "date") {
    document.querySelectorAll(".cal-cell[data-date]").forEach(cell => {
      const d = cell.dataset.date; if (!d) return;
      cell.onclick = () => toggleDatePick(d);
    });
  } else {
    document.querySelectorAll(".cal-cell[data-date]").forEach(cell => {
      const d = cell.dataset.date; if (!d) return;
      cell.onclick = () => openDateDetail(d);
    });
    document.querySelectorAll("[data-seg-date]").forEach(el => {
      el.onclick = (ev) => { ev.stopPropagation(); toggleSegment(el.dataset.segDate, el.dataset.seg); };
    });
  }

  const noteInput = document.getElementById("note-input");
  noteInput.oninput = (e) => state.noteDraft = e.target.value;
  document.getElementById("save-note").onclick = saveNote;
}

/* ============================================================ boot */
window.addEventListener("error", (e) => {
  const el = document.getElementById("app");
  if (el && !el.innerHTML.trim()) {
    el.innerHTML = `<div class="center-wrap"><div class="glass" style="padding:20px;max-width:420px;"><b style="color:var(--danger);">頁面發生錯誤</b><div style="font-size:13px;margin-top:8px;color:var(--muted2);">${esc(e.message||"未知錯誤")}</div></div></div>`;
  }
});

render(); // show the home screen immediately; don't block on Firebase

(async function boot(){
  try {
    const params = new URLSearchParams(window.location.search);
    const codeParam = params.get("code");
    await authReady;
    if (state.view === "home") render(); // pick up FIREBASE_INIT_ERROR banner if init failed
    sweepExpiredRooms(); // fire-and-forget, doesn't block the page
    if (codeParam) {
      const code = codeParam.trim().toUpperCase();
      const snap = await ref(`rooms/${code}/meta`).once("value");
      if (snap.val()) enterRoom(code);
    }
  } catch (e) {
    console.error("boot() failed:", e);
  }
})();
</script>
</body>
</html>
